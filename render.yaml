services:
  - type: web
    name: langgraph-multi-agent-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e "."
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: '["https://plasmacat420.github.io"]'
      - key: MAX_ITERATIONS
        value: "10"
    healthCheckPath: /health
