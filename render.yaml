services:
  - type: web
    name: langgraph-multi-agent-api
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://plasmacat420.github.io"]'
      - key: MAX_ITERATIONS
        value: "10"
    healthCheckPath: /health
